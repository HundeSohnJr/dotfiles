# Starship Config - Clean & Minimal Vibe

format = """
[](bold green)\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$line_break\
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "🌱 "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'

[nodejs]
symbol = "⬢ "
style = "bold green"
format = "via [$symbol($version )]($style)"

[python]
symbol = "🐍 "
style = "bold yellow"
format = "via [$symbol$pyenv_prefix($version )]($style)"

[rust]
symbol = "🦀 "
style = "bold red"
format = "via [$symbol($version )]($style)"

[golang]
symbol = "🐹 "
style = "bold cyan"
format = "via [$symbol($version )]($style)"

[docker_context]
symbol = "🐳 "
style = "bold blue"
format = "via [$symbol$context]($style) "
